<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8d5ff 0%, #d1b3ff 50%, #c9a6ff 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(147, 51, 234, 0.15);
            padding: 40px;
            border: 1px solid rgba(147, 51, 234, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e5d5ff;
        }

        .page-title {
            color: #7c3aed;
            font-size: 28px;
            font-weight: 700;
        }

        .back-button {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: linear-gradient(135deg, #9333ea 0%, #6d28d9 100%);
            transform: translateY(-2px);
        }

        .chart-section {
            margin-bottom: 40px;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            padding: 30px;
            border: 2px solid #e5d5ff;
            box-shadow: 0 10px 25px rgba(168, 85, 247, 0.1);
        }

        .chart-title {
            color: #7c3aed;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .chart-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="page-title">📊 Detailed Analytics</h1>
            <a href="{% url 'dashboard' %}" class="back-button">← Back to Dashboard</a>
        </div>

        <!-- Monthly Trends Chart -->
        <div class="chart-section">
            <div class="chart-container">
                <div class="chart-title">📈 12-Month Spending Trends</div>
                <canvas id="monthlyChart" width="800" height="400"></canvas>
            </div>
        </div>

        <!-- Category Breakdown -->
        <div class="chart-section">
            <div class="chart-container">
                <div class="chart-title">🥧 Category Distribution - {{ current_month }}</div>
                <canvas id="categoryChart" width="600" height="400"></canvas>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Monthly Trends Chart
        const monthlyData = {{ monthly_data|safe }};
        const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
        
        new Chart(monthlyCtx, {
            type: 'line',
            data: {
                labels: monthlyData.map(item => item.month),
                datasets: [{
                    label: 'Monthly Spending (₹)',
                    data: monthlyData.map(item => item.amount),
                    borderColor: '#a855f7',
                    backgroundColor: 'rgba(168, 85, 247, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#7c3aed',
                    pointBorderColor: '#ffffff',
                    pointBorderWidth: 2,
                    pointRadius: 6,
                    pointHoverRadius: 8
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: {
                            font: {
                                size: 14,
                                weight: 'bold'
                            },
                            color: '#7c3aed'
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        titleColor: '#7c3aed',
                        bodyColor: '#4c1d95',
                        borderColor: '#a855f7',
                        borderWidth: 2,
                        callbacks: {
                            label: function(context) {
                                return 'Spent: ₹' + context.parsed.y.toFixed(2);
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: {
                            color: 'rgba(168, 85, 247, 0.2)'
                        },
                        ticks: {
                            color: '#7c3aed',
                            font: {
                                size: 12
                            }
                        }
                    },
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: 'rgba(168, 85, 247, 0.2)'
                        },
                        ticks: {
                            color: '#7c3aed',
                            font: {
                                size: 12
                            },
                            callback: function(value) {
                                return '₹' + value.toFixed(0);
                            }
                        }
                    }
                },
                interaction: {
                    intersect: false,
                    mode: 'index'
                }
            }
        });

        // Category Pie Chart
        const categoryData = {{ category_data|safe }};
        const categoryCtx = document.getElementById('categoryChart').getContext('2d');
        
        if (categoryData && categoryData.length > 0) {
            new Chart(categoryCtx, {
                type: 'doughnut',
                data: {
                    labels: categoryData.map(item => item.name),
                    datasets: [{
                        data: categoryData.map(item => item.value),
                        backgroundColor: categoryData.map(item => item.color),
                        borderWidth: 3,
                        borderColor: '#ffffff',
                        hoverBorderWidth: 4,
                        hoverBorderColor: '#a855f7'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                usePointStyle: true,
                                font: {
                                    size: 14,
                                    weight: 'bold'
                                },
                                color: '#7c3aed'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.95)',
                            titleColor: '#7c3aed',
                            bodyColor: '#4c1d95',
                            borderColor: '#a855f7',
                            borderWidth: 2,
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((context.parsed / total) * 100).toFixed(1);
                                    return context.label + ': ₹' + context.parsed.toFixed(2) + ' (' + percentage + '%)';
                                }
                            }
                        }
                    },
                    cutout: '50%',
                    animation: {
                        animateRotate: true,
                        animateScale: true,
                        duration: 2000
                    }
                }
            });
        } else {
            categoryCtx.fillStyle = '#a855f7';
            categoryCtx.font = '18px Arial';
            categoryCtx.textAlign = 'center';
            categoryCtx.fillText('No expense data available', 300, 200);
        }

        // Add smooth animations to charts
        document.addEventListener('DOMContentLoaded', function() {
            const charts = document.querySelectorAll('canvas');
            charts.forEach(chart => {
                chart.style.opacity = '0';
                chart.style.transform = 'translateY(20px)';
                
                setTimeout(() => {
                    chart.style.transition = 'all 0.6s ease';
                    chart.style.opacity = '1';
                    chart.style.transform = 'translateY(0)';
                }, 200);
            });
        });
    </script>
</body>
</html>
