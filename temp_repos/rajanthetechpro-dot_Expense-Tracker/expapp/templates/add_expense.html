<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense - Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8d5ff 0%, #d1b3ff 50%, #c9a6ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(147, 51, 234, 0.15);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(147, 51, 234, 0.1);
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-title {
            color: #7c3aed;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .form-subtitle {
            color: #a855f7;
            font-size: 14px;
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #7c3aed;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5d5ff;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            color: #4c1d95;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
            background: rgba(255, 255, 255, 1);
        }

        .form-input::placeholder {
            color: #a78bfa;
            opacity: 0.7;
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-button:hover {
            background: linear-gradient(135deg, #9333ea 0%, #6d28d9 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(147, 51, 234, 0.3);
        }

        .back-button {
            display: inline-block;
            background: rgba(255, 255, 255, 0.8);
            color: #7c3aed;
            border: 2px solid #e5d5ff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .back-button:hover {
            background: #7c3aed;
            color: white;
            border-color: #7c3aed;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #dc2626;
            font-size: 14px;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #16a34a;
            font-size: 14px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .category-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            border: 2px solid #e5d5ff;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .category-option:hover {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
        }

        .category-option.selected {
            border-color: #7c3aed;
            background: rgba(124, 58, 237, 0.1);
        }

        .category-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .category-name {
            font-size: 12px;
            color: #4c1d95;
            font-weight: 600;
            text-align: center;
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .form-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <a href="{% url 'dashboard' %}" class="back-button">← Back to Dashboard</a>
        
        <div class="form-header">
            <h1 class="form-title">Add New Expense</h1>
            <p class="form-subtitle">Track your spending with detailed categorization</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                {% if message.tags == 'error' %}
                    <div class="error-message">{{ message }}</div>
                {% else %}
                    <div class="success-message">{{ message }}</div>
                {% endif %}
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="title" class="form-label">Expense Title</label>
                <input type="text" id="title" name="title" class="form-input" placeholder="e.g., Grocery shopping, Movie tickets" required>
            </div>

            <div class="form-group">
                <label for="amount" class="form-label">Amount (₹)</label>
                <input type="number" id="amount" name="amount" class="form-input" placeholder="0.00" step="0.01" min="0" required>
            </div>

            <div class="form-group">
                <label for="category" class="form-label">Category</label>
                <select id="category" name="category" class="form-select" required>
                    <option value="">Select a category</option>
                    {% for category in categories %}
                        <option value="{{ category.id }}" data-icon="{{ category.icon }}" data-color="{{ category.color }}">
                            {{ category.icon }} {{ category.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="date" class="form-label">Date</label>
                <input type="date" id="date" name="date" class="form-input" value="{{ today|date:'Y-m-d' }}" required>
            </div>

            <div class="form-group">
                <label for="description" class="form-label">Description (Optional)</label>
                <textarea id="description" name="description" class="form-textarea" placeholder="Add any additional notes about this expense..."></textarea>
            </div>

            <button type="submit" class="submit-button">Add Expense</button>
        </form>
    </div>

    <script>
        // Set today's date as default
        document.getElementById('date').valueAsDate = new Date();

        // Category selection enhancement
        const categorySelect = document.getElementById('category');
        const categoryOptions = document.querySelectorAll('.category-option');
        
        categorySelect.addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            if (selectedOption.value) {
                // You can add visual feedback here
                console.log('Selected category:', selectedOption.textContent);
            }
        });
    </script>
</body>
</html>
